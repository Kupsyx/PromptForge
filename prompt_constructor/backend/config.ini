[server]
# IP-адрес для привязки сервера.
# 0.0.0.0 = слушать на всех интерфейсах (доступно по локальной сети)
# 127.0.0.1 = только localhost
# Конкретный IP = только этот интерфейс, напр. 192.168.1.100
host = 0.0.0.0

# Порт. Поменяйте если конфликт с другим приложением (ComfyUI, Stable Diffusion и т.д.)
# Стандартные порты которые часто заняты: 8000, 8080, 7860, 3000
port = 8888

# Открывать браузер автоматически при запуске (true/false)
open_browser = true

# Адрес для ссылки в браузере (если host=0.0.0.0, укажите свой LAN IP для удобства)
# Если оставить пустым — будет использован localhost
browser_host =
